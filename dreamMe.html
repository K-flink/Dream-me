<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Me!</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="header">
        <div class="logo">
            <img src="logo.png" alt="Dream Me Logo">
            <span>Dream Me!</span>
        </div>
        <div class="auth-buttons">
            <button class="sign-in">Sign In</button>
            <button class="sign-up">Sign Up</button>
        </div>
    
    </div>
    <div class="main-content">
        <div class="upload-area" id="uploadArea">
            <div class="upload-text">Drop Image Here</div>
            <img id="imagePreview" alt="Preview">
            <canvas id="resultCanvas"></canvas>
        </div>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="sidebar">
        <div class="search-box">
            <input type="text" placeholder="Search for theme....">
        </div>

        <div class="themes">
            <div class="theme-card valentine" data-theme="valentine">
            <img src="dream me valentine icon.jpg" class="theme-img" alt="">
                <div class="theme-name">Valentine's</div>
            </div>
            <div class="theme-card christmas" data-theme="christmas">
             <img src="christmas icon.jpg" class="theme-img" alt="">
                <div class="theme-name">Christmas</div>
            </div>
            <div class="theme-card newyear" data-theme="newyear">
                <img src="new years icon.jpg" class="theme-img" alt="">
                <div class="theme-name">New Years</div>
            </div>
            <div class="theme-card halloween" data-theme="halloween">
                <img src="halloween icon.jpg" class="theme-img" alt="">
                <div class="theme-name">Halloween</div>
            </div>
            <div class="edit-section">
                <h3 style="color:white; margin-bottom:10px;">Adjust</h3>

                <label style="color:white;">Brightness</label>
                <input type="range" id="brightness" min="0.5" max="2" step="0.1" value="1">

                <label style="color:white;">Contrast</label>
                <input type="range" id="contrast" min="0.5" max="2" step="0.1" value="1">

                <label style="color:white;">Saturation</label>
                <input type="range" id="saturation" min="0.5" max="2" step="0.1" value="1">

                <div class="overlay-section">
                <label>
                <input type="checkbox" id="toggleColorOverlay">
                Enable Color Overlay
                </label>

                <input type="color" id="overlayColor">

                <input type="range" id="overlayOpacity"
                    min="0" max="1" step="0.05">
            </div>
            </div>
            <div class="edit-section" style="margin-top:20px;">
                <h3 style="color:white; margin-bottom:10px;">Text</h3>

                <input type="text" id="textInput" placeholder="Enter text..."
                        style="width:100%; padding:5px; margin-bottom:10px;">

                <label style="color:white;">Text Size</label>
                <input type="range" id="textSize" min="20" max="100" value="40">

                <label style="color:white;">Text Color</label>
                <input type="color" id="textColor" value="#ffffff">
                
                <label style="color:white;">Font</label>
                <select id="fontSelect" style="width:100%; margin-bottom:10px;">
                <option value="Arial">Arial</option>
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier</option>
                <option value="Times New Roman">Times</option>
                <option value="Impact">Impact</option>
                </select>
                <button id="addTextBtn" style="margin-top:10px; width:100%;">Add Text</button>

            <button class="dreamBtn" id="dreamButton" disabled>Dream It!</button>
            <button id="newPhotoBtn" class="dreamButton secondary">Choose New Photo</button>
        </div>

        

     <button class="download-button" id="downloadButton">Download Image</button>
    <div class="processing" id="processing">Dreaming...</div>

    <script src="dreamMe.js"></script>

    </body>
</html>
